spring.application.name=tgif_backend
spring.datasource.url=jdbc:mysql://localhost:3306/tgif
spring.datasource.username=root
spring.datasource.password=black0405
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.ai.base-url=https://api.openai.com/v1
app.ai.key=your_actual_api_key_here
app.ai.model=gpt-3.5-turbo

# PayPal Configuration
# You can get these from the PayPal Developer Dashboard (developer.paypal.com)
paypal.client-id=your_paypal_client_id_here
paypal.client-secret=your_paypal_client_secret_here
paypal.mode=sandbox

# Storage Service Keys (from storage.py migration)
storage.endpoint=your_endpoint
storage.access-key=your_access_key
storage.secret-key=your_secret_key
storage.bucket-name=your_bucket

# Security Keys (needed for your Auth migration)
app.jwt.secret=a_very_long_random_string_for_security
app.jwt.expiration-ms=3600000